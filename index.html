<!DOCTYPE html>
<html>
<head>
  <title>我的人生系统</title>
  <style>
  body {
    font-family: Arial;
    margin: 40px;
    background-color: #f5f5f5;
  }

  h1 {
    color: #333;
  }
</style>
</head>
<body>

<h1>欢迎来到我的网站</h1>

<h2>今天做了什么</h2>
<p>我开始学习做网站了！</p>

<h2>我的目标</h2>
<ul>
  <li>做一个赚钱的网站</li>
  <li>提升表达能力</li>
  <li>拥有更自由的人生</li>
</ul>
<h2>成长记录</h2>
<p>2026-04-07：开始做个人网站</p>
<section>
  <h2>📅 每日记录</h2>
  <div id="records"></div>
</section>
<script>
fetch('data.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('records');

    data.forEach(item => {
      const div = document.createElement('div');

      div.innerHTML = `
        <h3>${item.date}</h3>
        <p>🍚 饮食：${item.food}</p>
        <p>😴 睡眠：${item.sleep}</p>
        <p>💪 状态：${item.status}</p>
        <p>🧠 学习：${item.study}</p>
        <hr>
      `;

      container.appendChild(div);
    });
  });
</script>
</body>
</html>
